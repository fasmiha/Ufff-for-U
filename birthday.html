<!DOCTYPE html>
<html>
<head>
    <title>Birthday </title>

    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

    <style>
        body {
          margin: 0;
            padding: 0;
            background:linear-gradient(to right, #ff9a9e, #fad0c4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            font-family: 'Poppins', sans-serif;
 
        }

        .title {
            font-size: 60px;
            font-weight: bold;
            color: white;
            font-family: 'Dancing Script', cursive;
        }

        .wish {
            font-size: 22px;
            color: white;
            margin-bottom: 20px;
        }

        .memories {
            font-size: 30px;
            color: white;
            margin-bottom: 20px;
        }

        .numbers button {
            margin: 10px;
            padding: 20px 35px;  /* bigger buttons */
            font-size: 25px;
            border: none;
            border-radius: 15px;
            background: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .numbers button:hover {
            background: #ffe3ec;
            transform: scale(1.2);
        }
    </style>
</head>

<body>

    <!-- 1. BIG TITLE -->
    <h1 class="title">Happiest Birthday Roubey..❤️</h1>

    <!-- 2. WISH -->
    <p class="wish">May your life be full of happiness ✨</p>

    <!-- 3. MEMORIES -->
    <h2 class="memories">Memories 💖</h2>

    <!-- 4. BUTTONS → OPEN NEW PAGES -->
    <div class="numbers">
        <a href="image1.html"><button>1</button></a>
        <a href="image2.html"><button>2</button></a>
        <a href="image3.html"><button>3</button></a><br>
        <a href="image4.html"><button>4</button></a>
        <a href="image5.html"><button>5</button></a>
        <a href="image6.html"><button>6</button></a><br>
        <a href="image7.html"><button>7</button></a>
        <a href="image8.html"><button>8</button></a>
        <a href="image9.html"><button>9</button></a>


    </div>

</body>
</html>
