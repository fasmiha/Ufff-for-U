<!DOCTYPE html>
<html>
<head>
    <title>Wish</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('colour.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            font-family: 'Poppins', sans-serif;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 50px;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            animation: fadeIn 2s ease-in-out;
        }

        p {
            color: white;
            font-size: 20px;
            margin-bottom: 30px;
        }

        button {
            background: #ff5e8a;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.08);
            background: #ff3f73;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <h1>Ufff!! it's time  for surprise 💖</h1>
    <a href="birthday.html">
        <button>Click Here 🎁</button>
    </a>
</body>
</html>
